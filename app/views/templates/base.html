<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Inventario UMG{% endblock %}</title>

    <!-- Bootstrap 5 CSS - Framework de diseño responsive -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css" rel="stylesheet">

    <style>
        /* ── Estilos personalizados ── */
        body {
            background-color: #f8f9fa;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Barra de navegación oscura con acento azul */
        .navbar-brand {
            font-weight: 700;
            font-size: 1.1rem;
            letter-spacing: 0.5px;
        }

        /* Sidebar fija en pantallas grandes */
        .sidebar {
            position: fixed;
            top: 56px;
            left: 0;
            width: 220px;
            height: calc(100vh - 56px);
            background: #212529;
            padding-top: 1rem;
            z-index: 100;
        }

        .sidebar .nav-link {
            color: #adb5bd;
            padding: 0.6rem 1.2rem;
            border-radius: 6px;
            margin: 2px 8px;
            transition: all 0.2s;
        }

        .sidebar .nav-link:hover,
        .sidebar .nav-link.active {
            color: #fff;
            background: #0d6efd;
        }

        .sidebar .nav-link i {
            width: 20px;
            margin-right: 8px;
        }

        /* Área de contenido principal (desplazada por el sidebar) */
        .main-content {
            margin-left: 220px;
            margin-top: 56px;
            padding: 1.5rem;
        }

        /* Tarjetas del dashboard */
        .stat-card {
            border: none;
            border-radius: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
            transition: transform 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); }

        /* Badge de estructura de datos */
        .estructura-badge {
            font-size: 0.7rem;
            padding: 3px 8px;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Tabla de datos */
        .table th {
            background-color: #343a40;
            color: white;
            font-weight: 500;
            font-size: 0.85rem;
        }

        /* Barra de cola visual */
        .queue-item {
            border-left: 4px solid #0d6efd;
            background: white;
            border-radius: 0 8px 8px 0;
            padding: 10px 14px;
            margin-bottom: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .queue-item.first {
            border-left-color: #198754;  /* Verde para el primero (próximo a salir) */
        }

        /* Barra de pila visual */
        .stack-item {
            border-left: 4px solid #dc3545;
            background: white;
            border-radius: 0 8px 8px 0;
            padding: 10px 14px;
            margin-bottom: 6px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .stack-item.top {
            border-left-color: #fd7e14;  /* Naranja para la cima (próxima a salir) */
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>

<!-- ── Barra de navegación superior ── -->
<nav class="navbar navbar-dark bg-dark fixed-top px-3">
    <span class="navbar-brand">
        <i class="bi bi-boxes me-2"></i>Gestión de Inventarios
    </span>
    <span class="text-muted small">
        <i class="bi bi-mortarboard me-1"></i>Programación III · UMG 2026
    </span>
</nav>

<!-- ── Sidebar de navegación ── -->
<div class="sidebar">
    <ul class="nav flex-column">
        <li class="nav-item">
            <a href="/" class="nav-link {% if request.path == '/' %}active{% endif %}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>
        </li>
        <li class="nav-item">
            <a href="/productos" class="nav-link {% if '/productos' in request.path %}active{% endif %}">
                <i class="bi bi-box-seam"></i> Productos
            </a>
        </li>
        <li class="nav-item">
            <a href="/pedidos" class="nav-link {% if '/pedidos' in request.path %}active{% endif %}">
                <i class="bi bi-cart3"></i> Pedidos
                <span class="badge bg-primary ms-1 estructura-badge">Cola</span>
            </a>
        </li>
        <li class="nav-item">
            <a href="/devoluciones" class="nav-link {% if '/devoluciones' in request.path %}active{% endif %}">
                <i class="bi bi-arrow-return-left"></i> Devoluciones
                <span class="badge bg-danger ms-1 estructura-badge">Pila</span>
            </a>
        </li>
    </ul>

    <!-- Nota sobre estructuras al fondo del sidebar -->
    <div class="position-absolute bottom-0 p-3 text-muted" style="font-size:0.72rem; border-top:1px solid #343a40; width:100%;">
        <div class="mb-1"><span class="badge bg-primary">Cola FIFO</span> Pedidos</div>
        <div><span class="badge bg-danger">Pila LIFO</span> Devoluciones</div>
    </div>
</div>

<!-- ── Contenido principal ── -->
<div class="main-content">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap 5 JS (necesario para modales y dropdowns) -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
{% block extra_js %}{% endblock %}
</body>
</html>
